services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"

volumes:
  node_modules:
